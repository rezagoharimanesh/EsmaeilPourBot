<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ربات اسماعیل پور</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css" rel="stylesheet">
    <style>
        * { font-family: system-ui, -apple-system, 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body {
            background: linear-gradient(145deg, #002053 0%, #e6e9f0 100%);
            min-height: 100vh;
            padding: 15px;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(8px);
            border-radius: 28px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .btn-modern {
            background: #2b3a67;
            color: white;
            border: none;
            border-radius: 60px;
            padding: 12px 16px;
            font-weight: 600;
            width: 100%;
            margin-bottom: 10px;
        }
        .btn-modern:hover { background: #1f2a4f; color: white; }
        .btn-outline-modern {
            background: transparent;
            border: 2px solid #2b3a67;
            color: #2b3a67;
            border-radius: 60px;
            padding: 12px 16px;
            font-weight: 600;
            width: 100%;
            margin-bottom: 8px;
        }
        .btn-outline-modern:hover { background: #2b3a67; color: white; }
        .price-table { background: white; border-radius: 24px; overflow: hidden; width: 100%; }
        .price-table th { background: #2b3a67; color: white; padding: 12px; }
        .price-table td { padding: 10px; border-bottom: 1px solid #eef2f6; text-align: center; }
        .back-btn {
            margin-top: 20px;
            width: 100%;
            background: #e2e6ee;
            color: #2b3a67;
            border: none;
            border-radius: 60px;
            padding: 12px;
            font-weight: 600;
        }
        .vertical-options { display: flex; flex-direction: column; gap: 10px; margin: 15px 0; }
        .cart-item { background: #f0f3fa; border-radius: 20px; padding: 15px; margin-bottom: 12px; }
        .hidden { display: none !important; }
        .loading { text-align: center; padding: 50px; color: white; }
        .table-responsive { overflow-x: auto; }
        th, td { white-space: nowrap; }
    </style>
</head>
<body>
    <div class="container">
        <div class="text-center mb-4">
            <h2 class="fw-bold text-white">ربات اسماعیل پور</h2>
            <div class="mt-2">
                <button class="btn btn-light rounded-pill px-4" id="adminLoginBtn">🔒 ورود مدیریت</button>
                <span id="adminBadge" class="badge bg-success rounded-pill px-3 py-2 hidden">مدیر</span>
            </div>
        </div>
        <div id="loadingMsg" class="loading">⏳ در حال بارگذاری...</div>
        <div id="publicView" class="hidden"></div>
        <div id="adminView" class="hidden"></div>
    </div>

    <div class="modal fade" id="passwordModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title">ورود مدیریت</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="password" class="form-control rounded-pill" id="passwordInput" placeholder="رمز عبور">
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-secondary rounded-pill" data-bs-dismiss="modal">انصراف</button>
                    <button type="button" class="btn btn-primary rounded-pill" id="passwordSubmit">ورود</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const STEEL_DENSITY = 7850;
        const ADMIN_PASSWORD = "4107";
        
        let PRODUCT_TYPES = {};
        let STUD_PRICES = {};
        let CERAMIC_PRICE = 0;
        let ENGINEERING_VALUES = {};
        let isAdmin = false;
        let currentOrder = { type: null, thickness: null, width: null, isDecking: false, cart: [] };
        
        const DECKING_PROPERTIES = {
            '1': { name: 'گام 33 / ارتفاع 6 / عرض مفید 98', sheet_width_mm: 1250 },
            '2': { name: 'گام 25 / ارتفاع 6 / عرض مفید 94', sheet_width_mm: 1250 },
            '3': { name: 'گام 25 / ارتفاع 6 / عرض مفید 76', sheet_width_mm: 1000 },
            '4': { name: 'گام 30 / ارتفاع 7.5 / عرض مفید 94', sheet_width_mm: 1250 }
        };
        
        async function loadData() {
            try {
                const response = await fetch('prices.json?v=' + Date.now());
                if (!response.ok) throw new Error('فایل پیدا نشد');
                const data = await response.json();
                PRODUCT_TYPES = { galvanised: data.galvanised, oil: data.oil };
                STUD_PRICES = data.stud_prices;
                CERAMIC_PRICE = data.ceramic_price;
                ENGINEERING_VALUES = data.engineering_values;
                document.getElementById('loadingMsg').classList.add('hidden');
                document.getElementById('publicView').classList.remove('hidden');
                renderMainMenu();
            } catch (error) {
                document.getElementById('loadingMsg').innerHTML = '❌ خطا در بارگذاری اطلاعات<br><small>مطمئن شوید فایل prices.json وجود دارد</small>';
            }
        }
        
        function renderMainMenu() {
            let html = `<div class="glass-card"><div class="row g-3">`;
            for (let id in PRODUCT_TYPES) {
                html += `
                    <div class="col-md-6">
                        <button class="btn-modern menu-btn" data-action="price" data-type="${id}">💰 لیست قیمت ${PRODUCT_TYPES[id].name}</button>
                    </div>
                    <div class="col-md-6">
                        <button class="btn-modern menu-btn" data-action="buy" data-type="${id}">🛒 خرید ${PRODUCT_TYPES[id].name}</button>
                    </div>
                `;
            }
            html += `
                <div class="col-md-6">
                    <button class="btn-modern menu-btn" data-action="priceStuds">🔩 لیست گل میخ و سرامیک</button>
                </div>
                <div class="col-md-6">
                    <button class="btn-modern menu-btn" data-action="buyDecking">🏗️ خرید عرشه فولادی</button>
                </div>
                <div class="col-12">
                    <button class="btn-outline-modern menu-btn" data-action="support">📞 پشتیبانی</button>
                </div>
            `;
            html += `</div></div>`;
            document.getElementById('publicView').innerHTML = html;
        }
        
        function renderPriceTable(typeId) {
            const data = PRODUCT_TYPES[typeId];
            const thicknesses = Object.keys(data.prices).sort((a,b) => parseFloat(a)-parseFloat(b));
            const widths = new Set();
            Object.values(data.prices).forEach(p => Object.keys(p).forEach(w => widths.add(w)));
            const sortedWidths = Array.from(widths).sort((a,b) => parseInt(a)-parseInt(b));
            let html = `<div class="glass-card"><h4 class="mb-4">💰 ${data.name}</h4><div class="table-responsive"><table class="table price-table"><thead><tr><th>ضخامت (mm)</th>`;
            sortedWidths.forEach(w => html += `<th>عرض ${w}</th>`);
            html += '</thead><tbody>';
            thicknesses.forEach(th => {
                html += `<tr><td><strong>${th}</strong></td>`;
                sortedWidths.forEach(w => {
                    const price = data.prices[th]?.[w] || 0;
                    html += `<td>${price.toLocaleString()}</td>`;
                });
                html += `</tr>`;
            });
            html += '</tbody></table></div><button class="back-btn back-to-main">↩️ بازگشت</button></div>';
            document.getElementById('publicView').innerHTML = html;
        }
        
        function renderStudsPrice() {
            let html = `<div class="glass-card"><h4 class="mb-4">🔩 گل میخ و سرامیک</h4><table class="table price-table"><thead><tr><th>نوع</th><th>قیمت (تومان)</th></tr></thead><tbody>`;
            for (let size in STUD_PRICES) {
                html += `<tr><td>گل میخ ${size} mm</td><td>${STUD_PRICES[size].toLocaleString()}</td></tr>`;
            }
            html += `<tr><td>سرامیک</td><td>${CERAMIC_PRICE.toLocaleString()}</td></tr>`;
            html += '</tbody></table><button class="back-btn back-to-main">↩️ بازگشت</button></div>';
            document.getElementById('publicView').innerHTML = html;
        }
        
        function renderSupport() {
            document.getElementById('publicView').innerHTML = `<div class="glass-card text-center"><h4 class="mb-4">📞 پشتیبانی</h4><p class="mt-3 fs-5">۰۵۱۳۶۹۰۲۹۰۰<br>۰۵۱۳۶۹۰۲۹۰۱<br>۰۵۱۳۶۹۰۳۰۹۰</p><button class="back-btn back-to-main">↩️ بازگشت</button></div>`;
        }
        
        function renderBuyOptions(typeId) {
            const data = PRODUCT_TYPES[typeId];
            currentOrder = { type: typeId, thickness: null, width: null, isDecking: false, cart: [] };
            let html = `<div class="glass-card"><h4 class="mb-3">🛒 خرید ${data.name}</h4><h5>انتخاب ضخامت:</h5><div class="vertical-options">`;
            const thicknesses = Object.keys(data.prices).sort((a,b) => parseFloat(a)-parseFloat(b));
            thicknesses.forEach(th => { html += `<button class="btn btn-outline-modern buy-thickness" data-th="${th}">${th} mm</button>`; });
            html += '</div><div id="buyWidthContainer"></div><div id="buyFormContainer"></div><button class="back-btn back-to-main mt-4">↩️ بازگشت</button></div>';
            document.getElementById('publicView').innerHTML = html;
        }
        
        function renderBuyWidths(typeId, thickness) {
            const data = PRODUCT_TYPES[typeId];
            const widths = Object.keys(data.prices[thickness] || {});
            let html = '<h5 class="mt-3">انتخاب عرض:</h5><div class="vertical-options">';
            widths.sort((a,b) => parseInt(a)-parseInt(b)).forEach(w => { html += `<button class="btn btn-outline-modern buy-width" data-width="${w}">${w} mm</button>`; });
            html += '</div>';
            document.getElementById('buyWidthContainer').innerHTML = html;
            renderBuyForm();
        }
        
        function renderBuyForm() {
            let html = `<div class="row g-3 mt-3"><div class="col-md-6"><label class="form-label">طول (متر)</label><input type="number" id="buyLength" class="form-control rounded-pill" value="5" step="0.1"></div><div class="col-md-6"><label class="form-label">تعداد</label><input type="number" id="buyCount" class="form-control rounded-pill" value="1" min="1"></div><div class="col-12"><button class="btn-modern w-100" id="buyAddToCart">➕ افزودن به سبد</button></div></div><div id="cartDisplay" class="mt-4"></div><button class="btn-modern mt-3" id="buyFinish" style="display:none;">💰 اتمام خرید</button>`;
            document.getElementById('buyFormContainer').innerHTML = html;
            document.getElementById('buyAddToCart').addEventListener('click', addToCart);
        }
        
        function addToCart() {
            const length = parseFloat(document.getElementById('buyLength').value);
            const count = parseInt(document.getElementById('buyCount').value);
            if (isNaN(length) || length<=0 || isNaN(count) || count<=0) return alert('مقادیر نامعتبر');
            const result = calculateItem(currentOrder.type, currentOrder.thickness, currentOrder.width, length, count, currentOrder.isDecking);
            if (result.error) { alert(result.error); return; }
            currentOrder.cart.push(result);
            updateCartDisplay();
        }
        
        function updateCartDisplay() {
            const cart = currentOrder.cart;
            if (cart.length === 0) { document.getElementById('cartDisplay').innerHTML = ''; document.getElementById('buyFinish').style.display = 'none'; return; }
            let html = '<h6>🛍️ سبد خرید:</h6>';
            cart.forEach((item, idx) => { html += `<div class="cart-item">آیتم ${idx+1}: ${item.model_name} | ضخامت ${item.thickness}mm | تعداد ${item.count} | وزن ${item.total_weight_kg.toFixed(2)} کیلوگرم | قیمت ${item.total_cost.toLocaleString()} تومان</div>`; });
            document.getElementById('cartDisplay').innerHTML = html;
            document.getElementById('buyFinish').style.display = 'block';
            document.getElementById('buyFinish').onclick = showInvoice;
        }
        
        function showInvoice() {
            const cart = currentOrder.cart;
            if (cart.length === 0) return alert('سبد خالی است');
            let totalWeight = 0, totalRaw = 0;
            cart.forEach(it => { totalWeight += it.total_weight_kg; totalRaw += it.total_cost; });
            let final = totalRaw;
            let feeMsg = '';
            if (totalWeight < ENGINEERING_VALUES.service_fee_threshold_kg) {
                final += ENGINEERING_VALUES.service_fee_amount;
                feeMsg = `<span class="text-warning">+ اضافه‌بها ${ENGINEERING_VALUES.service_fee_amount.toLocaleString()} تومان</span>`;
            }
            let html = '<div class="glass-card"><h4 class="mb-4">🧾 فاکتور نهایی</h4>';
            cart.forEach((it, idx) => { html += `<div class="cart-item">آیتم ${idx+1}: ${it.model_name} | ضخامت ${it.thickness}mm | تعداد ${it.count} | وزن ${it.total_weight_kg.toFixed(2)} کیلوگرم | قیمت ${it.total_cost.toLocaleString()} تومان</div>`; });
            html += `<p class="mt-3"><strong>وزن کل:</strong> ${totalWeight.toFixed(2)} کیلوگرم<br><strong>جمع خام:</strong> ${totalRaw.toLocaleString()} تومان<br>${feeMsg}<br><strong class="text-success">💰 مبلغ نهایی: ${final.toLocaleString()} تومان</strong></p>`;
            html += `<button class="back-btn back-to-main">↩️ بازگشت</button></div>`;
            document.getElementById('publicView').innerHTML = html;
        }
        
        function calculateItem(typeId, thickness, width, length, count, isDecking) {
            try {
                const thicknessStr = thickness.toString();
                const widthStr = width.toString();
                let priceDict, modelName = '';
                if (isDecking) {
                    priceDict = PRODUCT_TYPES.galvanised.prices;
                    modelName = 'عرشه فولادی';
                } else {
                    priceDict = PRODUCT_TYPES[typeId].prices;
                    modelName = PRODUCT_TYPES[typeId].name;
                }
                const pricePerKg = priceDict[thicknessStr]?.[widthStr];
                if (!pricePerKg || pricePerKg === 0) return { error: 'قیمت ورق یافت نشد یا صفر است' };
                const sheetWidthM = parseInt(widthStr)/1000;
                const rawSheetArea = count * length * sheetWidthM;
                const thicknessM = parseFloat(thicknessStr)/1000;
                const totalWeight = rawSheetArea * thicknessM * STEEL_DENSITY;
                const materialCost = totalWeight * pricePerKg;
                const formingCost = totalWeight * ENGINEERING_VALUES.forming_cost_per_kg;
                const totalCost = materialCost + formingCost;
                return { model_name: modelName, thickness, width, length, count, total_weight_kg: totalWeight, total_cost: totalCost };
            } catch (e) { return { error: e.message }; }
        }
        
        function renderDeckingModels() {
            currentOrder = { type: 'decking', thickness: null, width: null, isDecking: true, cart: [] };
            let html = `<div class="glass-card"><h4 class="mb-3">🏗️ خرید عرشه فولادی</h4><h5>انتخاب مدل:</h5><div class="vertical-options">`;
            for (let key in DECKING_PROPERTIES) { html += `<button class="btn btn-outline-modern decking-model" data-model="${key}">${DECKING_PROPERTIES[key].name}</button>`; }
            html += '</div><div id="deckingThicknessContainer"></div><div id="buyFormContainer"></div><button class="back-btn back-to-main mt-4">↩️ بازگشت</button></div>';
            document.getElementById('publicView').innerHTML = html;
        }
        
        function renderDeckingThickness(model) {
            currentOrder.width = DECKING_PROPERTIES[model].sheet_width_mm.toString();
            let html = '<h5 class="mt-3">انتخاب ضخامت (گالوانیزه):</h5><div class="vertical-options">';
            const thicknesses = Object.keys(PRODUCT_TYPES.galvanised.prices).filter(t => parseFloat(t) >= 0.7).sort((a,b)=>parseFloat(a)-parseFloat(b));
            thicknesses.forEach(th => { html += `<button class="btn btn-outline-modern decking-thickness" data-th="${th}">${th} mm</button>`; });
            html += '</div>';
            document.getElementById('deckingThicknessContainer').innerHTML = html;
        }
        
        document.addEventListener('click', (e) => {
            if (e.target.classList.contains('back-to-main')) { renderMainMenu(); return; }
            if (e.target.classList.contains('menu-btn')) {
                const action = e.target.dataset.action, type = e.target.dataset.type;
                if (action === 'price') renderPriceTable(type);
                else if (action === 'buy') renderBuyOptions(type);
                else if (action === 'priceStuds') renderStudsPrice();
                else if (action === 'buyDecking') renderDeckingModels();
                else if (action === 'support') renderSupport();
                return;
            }
            if (e.target.classList.contains('buy-thickness')) { currentOrder.thickness = e.target.dataset.th; renderBuyWidths(currentOrder.type, currentOrder.thickness); return; }
            if (e.target.classList.contains('buy-width')) { currentOrder.width = e.target.dataset.width; return; }
            if (e.target.classList.contains('decking-model')) { renderDeckingThickness(e.target.dataset.model); return; }
            if (e.target.classList.contains('decking-thickness')) { currentOrder.thickness = e.target.dataset.th; renderBuyForm(); return; }
        });
        
        document.getElementById('adminLoginBtn').addEventListener('click', () => { new bootstrap.Modal(document.getElementById('passwordModal')).show(); });
        document.getElementById('passwordSubmit').addEventListener('click', () => {
            if (document.getElementById('passwordInput').value === ADMIN_PASSWORD) {
                bootstrap.Modal.getInstance(document.getElementById('passwordModal')).hide();
                alert('⚠️ تغییر قیمت‌ها: فایل prices.json را در GitHub ویرایش کنید');
            } else { alert('رمز اشتباه است'); }
        });
        
        loadData();
    </script>
</body>
</html>
